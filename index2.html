<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment | M2B Beauty Store</title>

    <link rel="stylesheet" href="css/style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.0/css/all.min.css">
</head>

<body>

    <!-- HEADER -->

    <header>

        <div class="logo">
            <a href="index.html">
                <img src="assets/images/logo.png" alt="Logo">
            </a>
        </div>

        <nav>
            <a href="index.html">Home</a>
            <a href="shop.html">Shop</a>
            <a href="search.html">Search</a>

            <a href="cart.html">
                <i class="fa-solid fa-cart-shopping"></i>
                <span class="cart-count">0</span>
            </a>
        </nav>

    </header>

    <!-- PAYMENT -->

    <section class="payment-page">

        <h1>Checkout Payment</h1>

        <div class="payment-container">

            <!-- FORM -->

            <form class="customer-form" id="paymentForm">

                <h2>Customer Information</h2>

                <input type="text" placeholder="Full Name" required>

                <input type="email" placeholder="Email Address" required>

                <input type="tel" placeholder="Phone Number" required>

                <textarea rows="5"
                    placeholder="Shipping Address"
                    required></textarea>

                <h3>Payment Method</h3>

                <label>

                    <input type="radio"
                        name="payment"
                        checked>

                    Bank Transfer

                </label>

                <label>

                    <input type="radio"
                        name="payment">

                    E-Wallet

                </label>

                <label>

                    <input type="radio"
                        name="payment">

                    Credit Card

                </label>

                <label>

                    <input type="radio"
                        name="payment">

                    Cash On Delivery

                </label>

            </form>

            <!-- ORDER SUMMARY -->

            <div class="order-summary">

                <h2>Order Summary</h2>

                <p>

                    <span>Subtotal</span>

                    <span id="subtotalPrice">

                        Rp 0

                    </span>

                </p>

                <p>

                    <span>Shipping</span>

                    <span>

                        Rp 10.000

                    </span>

                </p>

                <hr>

                <h2 id="totalPrice">

                    Rp 0

                </h2>

                <button id="placeOrder">

                    Place Order

                </button>

            </div>

        </div>

    </section>

    <!-- FOOTER -->

    <footer>

        <div class="footer-content">

            <div>

                <h2>M2B Beauty Store</h2>

                <p>

                    Beauty Starts From Healthy Skin.

                </p>

            </div>

            <div>

                <h3>Menu</h3>

                <a href="index.html">Home</a><br>
                <a href="shop.html">Shop</a><br>
                <a href="search.html">Search</a>

            </div>

            <div>

                <h3>Follow Us</h3>

                <i class="fa-brands fa-instagram"></i>

                <i class="fa-brands fa-facebook"></i>

                <i class="fa-brands fa-tiktok"></i>

            </div>

        </div>

        <hr>

        <p>

            © 2026 M2B Beauty Store. All Rights Reserved.

        </p>

    </footer>

    <!-- SCRIPT -->

    <script src="js/script.js"></script>

</body>

</html>
