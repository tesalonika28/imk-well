<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta charset="utf-8" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <title>IMK Well - Online Shop</title>
</head>
<body>

  <!-- HEADER -->
  <header>
    <nav>
      <div class="logo">IMK Well</div>
      <div class="menu">
        <a href="#home">Home</a>
        <a href="#products">Products</a>
        <a href="#cart">Cart</a>
        <a href="#contact">Contact</a>
      </div>
      <div class="icon">
        <i class="fas fa-search"></i>
        <i class="fas fa-shopping-cart"></i>
        <i class="fas fa-user"></i>
      </div>
    </nav>
  </header>

  <!-- SEARCH -->
  <div class="search">
    <input type="text" placeholder="Search products...">
  </div>

  <!-- BANNER -->
  <div class="banner">
    <div>
      <img src="https://c.animapp.com/mrhb772qAUeVUu/img/m2d-2-1.png" alt="Banner">
    </div>
    <div>
      <img src="https://c.animapp.com/mrhb772qAUeVUu/img/m2d-2-1.png" alt="Banner 2">
    </div>
  </div>

  <!-- CATEGORY -->
  <div class="category">
    <div class="box">
      <i class="fas fa-heart"></i>
      <h3>Popular</h3>
    </div>
    <div class="box">
      <i class="fas fa-star"></i>
      <h3>Best Seller</h3>
    </div>
    <div class="box">
      <i class="fas fa-fire"></i>
      <h3>Trending</h3>
    </div>
    <div class="box">
      <i class="fas fa-tag"></i>
      <h3>On Sale</h3>
    </div>
  </div>

  <!-- PRODUCTS -->
  <div class="products" id="products">
    <div class="card">
      <img src="https://via.placeholder.com/260x200" alt="Product 1">
      <h3>Product 1</h3>
      <p>High quality product</p>
      <div class="rating">
        <i class="fas fa-star"></i>
        <i class="fas fa-star"></i>
        <i class="fas fa-star"></i>
        <i class="fas fa-star"></i>
        <i class="fas fa-star-half-alt"></i>
      </div>
      <div class="price">$49.99</div>
      <div class="btn-area">
        <button class="btn detail">Detail</button>
        <button class="btn cart">Add Cart</button>
      </div>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/260x200" alt="Product 2">
      <h3>Product 2</h3>
      <p>Premium quality item</p>
      <div class="rating">
        <i class="fas fa-star"></i>
        <i class="fas fa-star"></i>
        <i class="fas fa-star"></i>
        <i class="fas fa-star"></i>
        <i class="fas fa-star"></i>
      </div>
      <div class="price">$59.99</div>
      <div class="btn-area">
        <button class="btn detail">Detail</button>
        <button class="btn cart">Add Cart</button>
      </div>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/260x200" alt="Product 3">
      <h3>Product 3</h3>
      <p>Best seller product</p>
      <div class="rating">
        <i class="fas fa-star"></i>
        <i class="fas fa-star"></i>
        <i class="fas fa-star"></i>
        <i class="fas fa-star"></i>
        <i class="fas fa-star-half-alt"></i>
      </div>
      <div class="price">$39.99</div>
      <div class="btn-area">
        <button class="btn detail">Detail</button>
        <button class="btn cart">Add Cart</button>
      </div>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/260x200" alt="Product 4">
      <h3>Product 4</h3>
      <p>Amazing product</p>
      <div class="rating">
        <i class="fas fa-star"></i>
        <i class="fas fa-star"></i>
        <i class="fas fa-star"></i>
        <i class="fas fa-star"></i>
        <i class="fas fa-star"></i>
      </div>
      <div class="price">$44.99</div>
      <div class="btn-area">
        <button class="btn detail">Detail</button>
        <button class="btn cart">Add Cart</button>
      </div>
    </div>
  </div>

  <!-- FOOTER -->
  <footer>
    <p>&copy; 2024 IMK Well. All rights reserved.</p>
  </footer>

  <!-- JAVASCRIPT -->
  <script src="script.js"></script>
</body>
</html>
